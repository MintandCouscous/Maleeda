    <circle r="1.2" fill="#F0A8B8"/>
  </g>
  <!-- leaves near top rose -->
  <path d="M108 15 C102 6 106 -2 114 4 C112 12 108 15 108 15Z" fill="#7A9E60" opacity="0.22"/>
  <path d="M136 16 C142 7 138 -1 130 5 C132 13 136 16 136 16Z" fill="#7A9E60" opacity="0.22"/>

  <!-- scattered small leaves along vine -->
  <ellipse cx="24" cy="210" rx="5"   ry="2.5" fill="#7A9E60" opacity="0.18" transform="rotate(-42 24 210)"/>
  <ellipse cx="56" cy="182" rx="4.5" ry="2.2" fill="#7A9E60" opacity="0.17" transform="rotate(22 56 182)"/>
  <ellipse cx="90" cy="128" rx="4.5" ry="2.2" fill="#7A9E60" opacity="0.17" transform="rotate(-32 90 128)"/>
  <ellipse cx="112" cy="96" rx="4"   ry="2"   fill="#7A9E60" opacity="0.16" transform="rotate(18 112 96)"/>
  <ellipse cx="102" cy="140" rx="4"  ry="2"   fill="#7A9E60" opacity="0.15" transform="rotate(-15 102 140)"/>

  <!-- tiny berries -->
  <circle cx="76" cy="144" r="1.8" fill="#D4708A" opacity="0.22"/>
  <circle cx="84" cy="139" r="1.4" fill="#D4708A" opacity="0.19"/>
  <circle cx="100" cy="104" r="1.6" fill="#D4708A" opacity="0.2"/>
  <circle cx="132" cy="52"  r="1.6" fill="#D4708A" opacity="0.2"/>
  <circle cx="140" cy="45"  r="1.2" fill="#D4708A" opacity="0.17"/>
</svg>
