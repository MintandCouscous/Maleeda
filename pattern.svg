<svg xmlns="http://www.w3.org/2000/svg" width="260" height="260" viewBox="0 0 260 260">
  <!-- main diagonal vine -->
  <path d="M10 255 C30 220 15 195 38 165 C60 135 82 148 100 115 C118 82 98 58 120 28 C130 14 142 4 155 0"
        fill="none" stroke="#C0808C" stroke-width="1.3" stroke-linecap="round" opacity="0.28"/>
  <!-- branch right -->
  <path d="M72 158 C95 145 118 155 136 138"
        fill="none" stroke="#C0808C" stroke-width="0.9" stroke-linecap="round" opacity="0.22"/>
  <!-- branch left -->
  <path d="M104 108 C82 96 62 104 44 88"
        fill="none" stroke="#C0808C" stroke-width="0.9" stroke-linecap="round" opacity="0.22"/>
  <!-- secondary vine right edge -->
  <path d="M220 260 C238 230 260 222 260 195 C260 168 238 155 248 125 C253 110 260 100 260 80"
        fill="none" stroke="#C0808C" stroke-width="1.0" stroke-linecap="round" opacity="0.18"/>
  <!-- connector bottom -->
  <path d="M0 190 C18 180 32 190 44 178"
        fill="none" stroke="#C0808C" stroke-width="0.8" stroke-linecap="round" opacity="0.17"/>

  <!-- ROSE 1 — full bloom on main vine -->
  <g transform="translate(38,163)" opacity="0.3">
    <ellipse rx="5.5" ry="3" fill="#D4708A" transform="rotate(0)   translate(0,-8)"/>
    <ellipse rx="5.5" ry="3" fill="#D4708A" transform="rotate(51)  translate(0,-8)"/>
    <ellipse rx="5.5" ry="3" fill="#D4708A" transform="rotate(102) translate(0,-8)"/>
    <ellipse rx="5.5" ry="3" fill="#D4708A" transform="rotate(153) translate(0,-8)"/>
    <ellipse rx="5.5" ry="3" fill="#D4708A" transform="rotate(204) translate(0,-8)"/>
    <ellipse rx="5.5" ry="3" fill="#D4708A" transform="rotate(255) translate(0,-8)"/>
    <ellipse rx="5.5" ry="3" fill="#D4708A" transform="rotate(306) translate(0,-8)"/>
    <ellipse rx="3.5" ry="2" fill="#E898A8" transform="rotate(25)  translate(0,-5)"/>
    <ellipse rx="3.5" ry="2" fill="#E898A8" transform="rotate(77)  translate(0,-5)"/>
    <ellipse rx="3.5" ry="2" fill="#E898A8" transform="rotate(129) translate(0,-5)"/>
    <ellipse rx="3.5" ry="2" fill="#E898A8" transform="rotate(181) translate(0,-5)"/>
    <ellipse rx="3.5" ry="2" fill="#E898A8" transform="rotate(233) translate(0,-5)"/>
    <ellipse rx="3.5" ry="2" fill="#E898A8" transform="rotate(285) translate(0,-5)"/>
    <ellipse rx="3.5" ry="2" fill="#E898A8" transform="rotate(337) translate(0,-5)"/>
    <circle r="3.2" fill="#C45070"/>
    <circle r="1.6" fill="#F0A8B8"/>
  </g>
  <!-- leaves around rose 1 -->
  <path d="M24 150 C18 140 22 130 30 136 C28 144 24 150 24 150Z" fill="#7A9E60" opacity="0.24"/>
  <path d="M54 150 C60 140 56 130 48 136 C50 144 54 150 54 150Z" fill="#7A9E60" opacity="0.24"/>
  <path d="M30 172 C20 174 14 166 20 158 C28 157 30 172 30 172Z" fill="#7A9E60" opacity="0.2"/>

  <!-- ROSEBUD — right branch -->
  <g transform="translate(137,136)" opacity="0.26">
    <path d="M0 12 C-5 7 -4 0 0 -3 C4 0 5 7 0 12Z" fill="#D4708A"/>
    <path d="M0 11 C-7 8 -6 1 0 -2" fill="none" stroke="#7A9E60" stroke-width="0.9" stroke-linecap="round"/>
    <path d="M0 11 C7 8 6 1 0 -2" fill="none" stroke="#7A9E60" stroke-width="0.9" stroke-linecap="round"/>
    <path d="M-2 10 C-6 8 -5 3 -2 5" fill="#7A9E60" opacity="0.7"/>
    <path d="M2 10 C6 8 5 3 2 5" fill="#7A9E60" opacity="0.7"/>
  </g>

  <!-- ROSEBUD — left branch -->
  <g transform="translate(43,86)" opacity="0.24">
    <path d="M0 10 C-4 6 -3 0 0 -2 C3 0 4 6 0 10Z" fill="#D4708A"/>
    <path d="M-1.5 12 C-5 10 -4 4 -1.5 2" fill="none" stroke="#7A9E60" stroke-width="0.8" stroke-linecap="round"/>
    <path d="M1.5 12 C5 10 4 4 1.5 2" fill="none" stroke="#7A9E60" stroke-width="0.8" stroke-linecap="round"/>
  </g>

  <!-- ROSE 2 — smaller near top of vine -->
  <g transform="translate(122,26)" opacity="0.26">
    <ellipse rx="4.5" ry="2.5" fill="#D4708A" transform="rotate(0)   translate(0,-7)"/>
    <ellipse rx="4.5" ry="2.5" fill="#D4708A" transform="rotate(60)  translate(0,-7)"/>
    <ellipse rx="4.5" ry="2.5" fill="#D4708A" transform="rotate(120) translate(0,-7)"/>
    <ellipse rx="4.5" ry="2.5" fill="#D4708A" transform="rotate(180) translate(0,-7)"/>
    <ellipse rx="4.5" ry="2.5" fill="#D4708A" transform="rotate(240) translate(0,-7)"/>
    <ellipse rx="4.5" ry="2.5" fill="#D4708A" transform="rotate(300) translate(0,-7)"/>
    <ellipse rx="2.8" ry="1.6" fill="#E898A8" transform="rotate(30)  translate(0,-4)"/>
    <ellipse rx="2.8" ry="1.6" fill="#E898A8" transform="rotate(90)  translate(0,-4)"/>
    <ellipse rx="2.8" ry="1.6" fill="#E898A8" transform="rotate(150) translate(0,-4)"/>
    <ellipse rx="2.8" ry="1.6" fill="#E898A8" transform="rotate(210) translate(0,-4)"/>
    <ellipse rx="2.8" ry="1.6" fill="#E898A8" transform="rotate(270) translate(0,-4)"/>
    <ellipse rx="2.8" ry="1.6" fill="#E898A8" transform="rotate(330) translate(0,-4)"/>
